<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.29/"></script>

    <style>
        body{
            margin:0;
            font-family:"Segue UI";
            background:#f1f5f9;
            color:#1e293b;
            display:flex;
        }

        .sidebar{
            width:240px;
            background:#ffffff;
            height:100vh;
            padding:20px;
            border-right:1px solid #e2e8f0;
        }

        .logo{
            font-size:20px;
            font-weight:bold;
            color:#4f46e5;
            margin-bottom:30px;
        }

        .menu a{
            display:block;
            padding:10px;
            margin:8px 0;
            border-radius:6px;
            cursor:pointer;
            color:#1e293b;
        }

        .menu .active{
            background:#eef2ff;
            color:#4f46e5;
        }

        .logout{
            margin-top:30px;
            background:#ef4444;
            color:white;
            padding:10px;
            border-radius:6px;
            text-align:center;
            cursor:pointer;
        }

        .main{
            flex:1;
            padding:30px;
        }

        .header h1{
            margin:0;
            color:#4f46e5;
        }

        .cards{
            display:flex;
            gap:20px;
            margin-top:20px;
            margin-bottom:25px;
        }

        .card{
            flex:1;
            background:#ffffff;
            padding:20px;
            border-radius:10px;
            border:1px solid #e2e8f0;
        }

        .search-box{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border-radius:6px;
            border:1px solid #e2e8f0;
        }

        .table-box{
            background:#ffffff;
            padding:20px;
            border-radius:10px;
            border:1px solid #e2e8f0;
            margin-bottom:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:12px;
            border-bottom:1px solid #e2e8f0;
        }

        .btn{
            padding:6px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .edit-btn{ background:#3b82f6; color:white; }
        .delete-btn{ background:#ef4444; color:white; }

        .pagination-controls{
            display:flex;
            justify-content:center;
            gap:15px;
            margin-top:20px;
        }

        #viewDivAdmin{
            height:400px;
            border-radius:10px;
            margin-top:10px;
        }

        .translate-box{
            margin-top:20px;
            margin-bottom:20px;
        }

        .translate-box button{
            background:#10b981;
            color:white;
            padding:8px 14px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo" data-translate>🌍 GeoExplorer</div>

    <div class="menu">
        <a class="active" data-translate>Admin Dashboard</a>
    </div>

    <div class="logout" onclick="logout()" data-translate>Logout</div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1 data-translate>Admin Dashboard</h1>
        <p data-translate>Manage users and geographical data</p>
    </div>

    <!-- ✅ TRANSLATE CONTROL -->
    <!-- ==========================
      TRANSLATE BOX
 ========================== -->
    <div class="translate-box">
        <label for="languageSelect">Select Language:</label>
        <select id="languageSelect">
            <option value="en" selected>English</option>
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
            <option value="te">Telugu</option>
        </select>

        <!-- Translate happens ONLY when this button is clicked -->
        <button type="button">Translate Page</button>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h2 id="totalUsers">0</h2>
            <p data-translate>Total Users</p>
        </div>

        <div class="card">
            <h2 id="adminUsers">0</h2>
            <p data-translate>Admin Users</p>
        </div>

        <div class="card">
            <h2 id="totalGeo">0</h2>
            <p data-translate>Total Geo Records</p>
        </div>
    </div>

    <!-- USERS TABLE -->
    <div class="table-box">
        <h2 data-translate>Users</h2>

        <input type="text" id="searchUsers" class="search-box" placeholder="Search users...">

        <table>
            <thead>
            <tr>
                <th data-translate>ID</th>
                <th data-translate>Name</th>
                <th data-translate>Email</th>
                <th data-translate>Role</th>
                <th data-translate>Date</th>
                <th data-translate>Action</th>
            </tr>
            </thead>

            <tbody id="usersTable"></tbody>
        </table>
    </div>

    <!-- GEO TABLE -->
    <div class="table-box">
        <h2 data-translate>Geographical Data</h2>

        <input type="text" id="searchGeoData" class="search-box" placeholder="Search geo data...">

        <table>
            <thead>
            <tr>
                <th data-translate>ID</th>
                <th data-translate>User</th>
                <th data-translate>Latitude</th>
                <th data-translate>Longitude</th>
                <th data-translate>Description</th>
                <th data-translate>Remarks</th>
                <th data-translate>Status</th>
            </tr>
            </thead>

            <tbody id="geoTable"></tbody>
        </table>
    </div>

    <!-- MAP -->
    <div class="table-box">
        <h2 data-translate>Map View</h2>
        <div id="viewDivAdmin"></div>
    </div>

</div>

<script src="admin-dashboard.js"></script>

</body>
</html>
