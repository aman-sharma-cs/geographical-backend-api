<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form id="loginForm">

        <input type="text"
               id="userName"
               placeholder="Username"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <button type="submit">Login</button>

    </form>

    <p>
        New User?
        <a href="user_signup.html">User Signup</a>
    </p>

    <p>
        Admin Registration?
        <a href="admin_signup.html">Admin Signup</a>
    </p>

</div>

<script src="login.js"></script>

</body>
</html>
