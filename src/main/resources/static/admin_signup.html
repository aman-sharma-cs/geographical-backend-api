<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Signup - Geographical System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-container {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #2a5298;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #2a5298;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="signup-container">

    <h2>Admin Signup</h2>

    <!-- IMPORTANT: id must match JS -->
    <form id="adminSignupForm">

        <input type="text"
               id="userName"
               placeholder="Admin Username"
               required>

        <input type="email"
               id="email"
               placeholder="Admin Email"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <button type="submit">Create Admin Account</button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
    </div>

</div>

<!-- CONNECT JS -->
<script src="admin_signup.js"></script>

</body>
</html>
